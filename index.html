<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>Rewarded Test Page</title>
    <style>
        :root {
            --fs-base: clamp(1.4rem, 5.5vw, 2.2rem);
            --fs-popup: clamp(1.8rem, 6.5vw + 1rem, 2.8rem);
            --padding-popup: clamp(1.8rem, 6vw, 3rem);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            height: 100dvh;
            background: #0f0f1a;
            font-family: system-ui, -apple-system, sans-serif;
            display: grid;
            place-items: center;
            color: white;
            overscroll-behavior: none;
        }

        button {
            padding: clamp(1.2rem, 5vw, 1.8rem) clamp(2.8rem, 10vw, 5rem);
            font-size: var(--fs-base);
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            border: none;
            border-radius: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.5);
            transition: all 0.3s ease;
            touch-action: manipulation;
            min-width: 80vw;
            max-width: 90vw;
        }

        button:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow: 0 18px 45px rgba(255, 107, 107, 0.6);
        }

        button:active {
            transform: translateY(-1px) scale(0.98);
        }

        /* Popup */
        .reward-popup {
            position: fixed;
            inset: 0;
            background: rgba(20, 20, 40, 0.94);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--padding-popup);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.45s ease, transform 0.45s ease;
            transform: scale(0.9) translateY(10px);
            z-index: 9999;
            text-align: center;
        }

        .reward-popup.show {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateY(0);
        }

        .reward-popup-content {
            position: relative;
            max-width: 90vw;
            line-height: 1.4;
            font-size: var(--fs-popup);
            font-weight: 700;
            padding: 1rem 1rem 2rem;
        }

        .close-btn {
            position: absolute;
            top: -0.5rem;
            right: -0.5rem;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 28px;
            font-weight: bold;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }

        .close-btn:hover,
        .close-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .coins {
            font-size: clamp(2.8rem, 12vw, 5rem);
            margin-left: 0.7rem;
            vertical-align: middle;
        }

        /* Desktop: smaller centered card */
        @media (min-width: 640px) {
            .reward-popup {
                inset: auto;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) scale(0.9);
                max-width: 500px;
                max-height: 80vh;
                border-radius: 2rem;
                padding: 3rem 4rem;
                box-shadow: 0 20px 70px rgba(0,0,0,0.7);
            }

            .reward-popup.show {
                transform: translate(-50%, -50%) scale(1.03);
            }

            .close-btn {
                top: -1rem;
                right: -1rem;
            }
        }

        /* Safe areas (iPhone notch, dynamic island, etc.) */
        @supports (padding-top: env(safe-area-inset-top)) {
            .reward-popup {
                padding-top: calc(var(--padding-popup) + env(safe-area-inset-top));
                padding-bottom: calc(var(--padding-popup) + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

<button onclick="showReward()">Rewarded test</button>

<div id="rewardPopup" class="reward-popup" onclick="closeReward(event)">
    <div class="reward-popup-content">
        You have earned 3 coins <span class="coins">🪙🪙🪙</span>

        <button class="close-btn" onclick="closeReward()">×</button>
    </div>
</div>

<script>
    function showReward() {
        document.getElementById('rewardPopup').classList.add('show');
    }

    function closeReward(event) {
        // Only close if clicking background or the close button itself
        if (!event || event.target.classList.contains('close-btn') || event.target === event.currentTarget) {
            document.getElementById('rewardPopup').classList.remove('show');
        }
    }
</script>

</body>
</html>
