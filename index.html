<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>Rewarded Test Page</title>
    <style>
        :root {
            --fs-base: clamp(1.3rem, 4.8vw, 1.9rem);
            --fs-title: clamp(1.9rem, 7.2vw, 2.9rem);
            --fs-coins: clamp(3.2rem, 14vw, 5.5rem);
            --padding-popup: clamp(2rem, 7vw, 3.5rem);
            --radius: 1.8rem;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            height: 100dvh;
            background: #0d0d17;
            font-family: system-ui, -apple-system, sans-serif;
            display: grid;
            place-items: center;
            color: white;
            overscroll-behavior: none;
        }

        button {
            padding: clamp(1.3rem, 5.5vw, 2rem) clamp(3rem, 12vw, 6rem);
            font-size: var(--fs-base);
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #ff5252, #ff8a65);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            box-shadow: 0 12px 36px rgba(255, 82, 82, 0.45);
            transition: all 0.28s ease;
            touch-action: manipulation;
            min-width: 82vw;
            max-width: 92vw;
        }

        button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 50px rgba(255, 82, 82, 0.6);
        }

        button:active {
            transform: translateY(-1px) scale(0.97);
        }

        /* ────────────────────────────────────────
           POPUP
        ──────────────────────────────────────── */
        .reward-popup {
            position: fixed;
            inset: 0;
            background: rgba(15, 15, 35, 0.96);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--padding-popup);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1),
            transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(0.88) translateY(20px);
            z-index: 9999;
        }

        .reward-popup.show {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateY(0);
        }

        .reward-popup-content {
            text-align: center;
            max-width: 90vw;
            margin-bottom: 2.5rem;
        }

        .reward-title {
            font-size: var(--fs-title);
            font-weight: 800;
            margin-bottom: 1.2rem;
            line-height: 1.15;
        }

        .reward-text {
            font-size: var(--fs-base);
            opacity: 0.92;
            line-height: 1.45;
            margin-bottom: 1.8rem;
        }

        .coins {
            font-size: var(--fs-coins);
            font-weight: 900;
            margin: 0 0.4rem;
            display: inline-block;
            vertical-align: middle;
            animation: coin-pop 0.7s ease-out;
        }

        @keyframes coin-pop {
            0%   { transform: scale(0.4) rotate(-15deg); opacity: 0; }
            60%  { transform: scale(1.18) rotate(8deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        /* Close button */
        .close-btn {
            padding: clamp(1rem, 4.5vw, 1.4rem) clamp(2.8rem, 10vw, 4.5rem);
            font-size: var(--fs-base);
            font-weight: 700;
            color: white;
            background: #e63946;
            border: none;
            border-radius: 1.2rem;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(230, 57, 70, 0.45);
            transition: all 0.25s ease;
            min-width: 70vw;
            max-width: 85vw;
        }

        .close-btn:hover {
            background: #d00000;
            transform: translateY(-3px);
            box-shadow: 0 14px 35px rgba(230, 57, 70, 0.6);
        }

        .close-btn:active {
            transform: scale(0.97);
        }

        /* Desktop / tablet style */
        @media (min-width: 640px) {
            .reward-popup {
                inset: auto;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) scale(0.88);
                max-width: 460px;
                border-radius: 2.2rem;
                padding: 3.5rem 3rem;
                box-shadow: 0 24px 80px rgba(0,0,0,0.65);
            }

            .reward-popup.show {
                transform: translate(-50%, -50%) scale(1);
            }

            .close-btn {
                min-width: 240px;
                max-width: 320px;
            }
        }

        /* Safe area insets (iPhone notch, dynamic island, Android cutouts) */
        @supports (padding-top: env(safe-area-inset-top)) {
            .reward-popup {
                padding-top: calc(var(--padding-popup) + env(safe-area-inset-top));
                padding-bottom: calc(var(--padding-popup) + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

<button onclick="showReward()">Claim Reward</button>

<div id="rewardPopup" class="reward-popup">
    <div class="reward-popup-content">
        <div class="reward-title">Reward Unlocked!</div>
        <div class="reward-text">You have earned</div>
        <div>
            <span class="coins">3</span>
            <span class="coins">🪙</span>
        </div>
    </div>

    <button class="close-btn" onclick="hideReward()">Close</button>
</div>

<script>
    function showReward() {
        document.getElementById('rewardPopup').classList.add('show');
    }

    function hideReward() {
        document.getElementById('rewardPopup').classList.remove('show');
    }

    // Optional: close when clicking outside content (but not on button)
    document.getElementById('rewardPopup').addEventListener('click', function(e) {
        if (e.target === this) {
            hideReward();
        }
    });
</script>

</body>
</html>
